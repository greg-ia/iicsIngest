name: Deploy iicsIngest - PRODUCAO

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Digite "iicsIngest" para confirmar o deploy em producao'
        required: true
        default: ''

jobs:
  deploy:
    name: Implantar o iicsIngest no servidor de producao
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'iicsIngest'

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            
            # Diretorios
            BASE_DIR="/opt/engenharia/iicsIngest"
            PRD_DIR="$BASE_DIR/prd"
            
            # Ir para a raiz do repositorio
            cd $BASE_DIR

            # Baixa as últimas alterações do remote main
            git fetch origin main
            git reset --hard origin/main
            
            # Prepara e limpa o diretório hml
            rm -rf $PRD_DIR/*
            mkdir -p $PRD_DIR
            cp *.sh *.py requirements.txt $PRD_DIR/
            rm *.sh *.py requirements.txt
                                                        
            cd $PRD_DIR
            chmod +x *.sh
            
            # Cria o arquivo .env com todas as variáveis
            cat > .env <<EOF
            # Ambiente
            ENV=${{ secrets.ENV_HML }}
                    
            # IICS Credentials
            USUARIO_IICS=${{ secrets.USUARIO_IICS }}
            SENHA_IICS=${{ secrets.SENHA_IICS }}
            
            # Configurações adicionais
            CONFIG_PATH=${{ secrets.CONFIG_PATH }}
            
            # MySQL para Ruleguardian
            MYSQL_RG_HOST=${{ secrets.MYSQL_RG_HOST }}
            MYSQL_RG_USER=${{ secrets.MYSQL_RG_USER }}
            MYSQL_RG_PASSWORD=${{ secrets.MYSQL_RG_PASSWORD }}
            MYSQL_RG_DATABASE=${{ secrets.MYSQL_RG_DATABASE }}
            EOF
            
            # Configura o ambiente virtual
            rm -rf venv
            python3 -m venv venv
            . venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            
            echo "=== HML DEPLOY SUCCESS ==="