name: Deploy iicsIngest - PRODUCAO

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Digite "iicsIngest" para confirmar o deploy em producao'
        required: true
        default: ''

jobs:
  deploy:
    name: Implantar o iicsIngest no servidor de producao
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'iicsIngest'

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e  # Sai imediatamente se qualquer comando falhar
                    
            # Diretorios
            BASE_DIR="/opt/engenharia/iicsIngest"
            PRD_DIR="$BASE_DIR/prd"
            
            # Ir para a raiz do repositorio
            cd $BASE_DIR
          
            # Baixa as últimas alterações do remote main e redefine o branch local para corresponder exatamente
            git fetch origin main
            git reset --hard origin/main
            
            # Prepara e limpa o diretório hml
            rm -rf $PRD_DIR/*
            mkdir -p $PRD_DIR
            cp *.py requirements.txt pyproject.toml $PRD_DIR/
            rm *.py requirements.txt pyproject.toml
                                                        
            cd $PRD_DIR
            
            # Cria o arquivo .env (use seus segredos reais em vez de valores fixos)       
            cat > .env <<EOF
            ENV=${{ secrets.ENV_PRD }}
            MYSQL_RG_HOST=${{ secrets.MYSQL_RG_HOST }}
            MYSQL_RG_PORTA=${{ secrets.MYSQL_RG_PORTA }}
            MYSQL_RG_DATABASE=${{ secrets.MYSQL_RG_DATABASE }}
            MYSQL_RG_USER=${{ secrets.MYSQL_RG_USER }}
            MYSQL_RG_PASSWORD=${{ secrets.MYSQL_RG_PASSWORD }}
            
            SECRET_KEY=${{ secrets.SECRET_KEY }}
             
            EOF
            
            # Configura o ambiente virtual
            rm -rf venv
            python3 -m venv venv
            . venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt            
              echo "Deploy do iicsIngest em producao concluído com sucesso!"